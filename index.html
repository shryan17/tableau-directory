<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau Dashboard Directory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --super-blue: #1D6BFF;
      --super-blue-dark: #1455CC;
      --super-blue-light: #E8F0FF;
      --blueberry-110: #002049;
      --agave-30: #82F2FE;
      --agave-20: #C3F5FE;
      --agave-10: #EAFEFF;
      --wintermint-100: #EFF4F8;
      --tofu-100: #F4F5F0;
      --white: #FFFFFF;
      --gray-mid: #6B7280;
      --gray-light: #E2E5EA;
      --gray-lighter: #F4F5F7;
    }

    body {
      font-family: 'Avenir Next', 'Segoe UI', Arial, sans-serif;
      background: var(--white);
      color: #1A1D23;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 40px;
      color: var(--gray-mid); font-size: 13px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--gray-light);
      border-top-color: var(--super-blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #FFF0F0; border: 1px solid #FFCCCC;
      border-radius: 8px; padding: 12px 16px;
      font-size: 13px; color: #C0392B;
      margin-bottom: 12px; display: none;
    }
    .error-msg.show { display: block; }

    .folder-list { flex: 1; }

    .folder {
      border: 1px solid var(--gray-light);
      border-radius: 10px; margin-bottom: 8px;
      overflow: visible; background: var(--white);
      transition: box-shadow 0.15s;
    }
    .folder:hover { box-shadow: 0 2px 12px rgba(29,107,255,0.10); }

    .folder-header {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; cursor: pointer;
      background: var(--white); user-select: none;
      border-radius: 10px; transition: background 0.12s;
    }
    .folder-header:hover { background: var(--super-blue-light); }

    .folder-icon {
      width: 18px; height: 14px;
      border-radius: 0 4px 4px 4px;
      flex-shrink: 0; position: relative;
    }
    .folder-icon::before {
      content: ''; position: absolute;
      top: -5px; left: 0; width: 7px; height: 5px;
      border-radius: 2px 2px 0 0;
    }

    .f-exec .folder-icon         { background: #002049; }
    .f-exec .folder-icon::before { background: #002049; }
    .f-fall .folder-icon         { background: #82F2FE; }
    .f-fall .folder-icon::before { background: #82F2FE; }
    .f-plan .folder-icon         { background: #C3F5FE; }
    .f-plan .folder-icon::before { background: #C3F5FE; }
    .f-rec  .folder-icon         { background: #EFF4F8; border: 1px solid #D0DCE8; }
    .f-rec  .folder-icon::before { background: #EFF4F8; }

    .f-exec .open-btn { background: #002049; color: #fff; border-color: #002049; }
    .f-exec .open-btn:hover { background: #00163a; border-color: #00163a; }
    .f-fall .open-btn { background: #82F2FE; color: #005B6B; border-color: #82F2FE; }
    .f-fall .open-btn:hover { background: #55E8F9; border-color: #55E8F9; }
    .f-plan .open-btn { background: #C3F5FE; color: #005B6B; border-color: #C3F5FE; }
    .f-plan .open-btn:hover { background: #A0EDFB; border-color: #A0EDFB; }
    .f-rec  .open-btn { background: #EFF4F8; color: #002049; border-color: #D0DCE8; }
    .f-rec  .open-btn:hover { background: #DDE7F0; border-color: #C0CEDB; }

    .f-exec .dash-dot { background: #002049; }
    .f-fall .dash-dot { background: #82F2FE; border: 1px solid #50D8EE; }
    .f-plan .dash-dot { background: #C3F5FE; border: 1px solid #82D8EE; }
    .f-rec  .dash-dot { background: #EFF4F8; border: 1px solid #C0CEDB; }

    .folder-name { font-size: 13.5px; font-weight: 600; color: var(--blueberry-110); flex: 1; }
    .folder-count {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      background: var(--super-blue-light); color: var(--super-blue);
    }
    .chevron {
      font-size: 9px; color: var(--gray-mid);
      transition: transform 0.2s ease;
      display: inline-block; margin-left: 4px;
    }
    .chevron.open { transform: rotate(90deg); }

    .folder-body {
      border-top: 1px solid var(--gray-lighter);
      display: none; border-radius: 0 0 10px 10px; overflow: hidden;
    }
    .folder-body.open { display: block; }

    .dash-item { border-bottom: 1px solid var(--gray-lighter); position: relative; }
    .dash-item:last-child { border-bottom: none; }

    .dash-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px 8px 40px;
      transition: background 0.1s; cursor: pointer;
    }
    .dash-row:hover { background: var(--super-blue-light); }

    .dash-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dash-name { font-size: 13px; color: #1A1D23; flex: 1; }

    .open-btn {
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px; border: 1px solid;
      cursor: pointer; font-weight: 600;
      font-family: inherit; white-space: nowrap;
      transition: all 0.12s; text-decoration: none;
      display: inline-block;
    }

    .expand-indicator {
      font-size: 10px; color: var(--gray-mid);
      margin-left: 2px; transition: transform 0.2s;
      display: inline-block;
    }
    .expand-indicator.open { transform: rotate(90deg); }

    .delete-btn {
      background: none; border: none; color: var(--gray-light);
      cursor: pointer; font-size: 15px; line-height: 1;
      padding: 0 2px; display: none; transition: color 0.12s;
    }
    .delete-btn:hover { color: #D93025; }

    /* Description / edit panel */
    .desc-panel {
      display: none;
      padding: 10px 14px 12px 52px;
      background: var(--gray-lighter);
      border-top: 1px solid var(--gray-light);
    }
    .desc-panel.open { display: block; }

    /* View mode */
    .desc-text { font-size: 12px; color: var(--gray-mid); line-height: 1.5; font-style: italic; }
    .desc-text.empty { color: #BFC3CA; }

    /* Edit mode fields */
    .edit-fields { display: none; }
    .edit-fields.show { display: block; }

    .field-label {
      font-size: 11px; font-weight: 600;
      color: var(--blueberry-110);
      margin-bottom: 4px; display: block;
    }

    .edit-name-input,
    .edit-desc-textarea,
    .edit-url-input {
      width: 100%; font-size: 12px; color: #1A1D23;
      border: 1.5px solid var(--gray-light); border-radius: 6px;
      padding: 6px 8px; outline: none; font-family: inherit;
      background: var(--white); margin-bottom: 10px;
    }
    .edit-name-input:focus,
    .edit-desc-textarea:focus,
    .edit-url-input:focus { border-color: var(--super-blue); }

    .edit-desc-textarea { min-height: 60px; resize: vertical; line-height: 1.5; }

    .save-row {
      display: flex; align-items: center; gap: 10px; margin-top: 2px;
    }

    .save-btn {
      font-size: 12px; padding: 5px 16px; border-radius: 20px;
      border: none; background: var(--super-blue); color: var(--white);
      cursor: pointer; font-weight: 600; font-family: inherit;
      transition: background 0.12s;
    }
    .save-btn:hover { background: var(--super-blue-dark); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .save-feedback {
      font-size: 11px; color: var(--gray-mid);
      transition: color 0.3s;
    }
    .save-feedback.success { color: #007A3D; }
    .save-feedback.error   { color: #D93025; }

    /* Add row */
    .add-dash-row {
      display: none; align-items: center; gap: 8px;
      padding: 8px 14px 8px 40px;
      border-top: 1px dashed var(--gray-light);
      background: var(--wintermint-100);
    }
    .add-dash-row.show { display: flex; }
    .add-dash-input {
      font-size: 13px; color: #1A1D23; flex: 1;
      border: 1.5px solid var(--gray-light); border-radius: 6px;
      padding: 4px 8px; outline: none; font-family: inherit; background: var(--white);
    }
    .add-dash-input:focus { border-color: var(--super-blue); }
    .add-dash-btn {
      font-size: 12px; padding: 4px 14px; border-radius: 20px;
      border: none; background: var(--super-blue); color: var(--white);
      cursor: pointer; font-weight: 600; white-space: nowrap; font-family: inherit;
    }
    .add-dash-btn:hover { background: var(--super-blue-dark); }
    .add-dash-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Edit banner */
    .edit-banner {
      display: none; background: var(--blueberry-110);
      color: var(--white); font-size: 12px;
      padding: 8px 14px; border-radius: 8px; margin-bottom: 14px;
      align-items: center; gap: 8px;
    }
    .edit-banner.show { display: flex; }
    .edit-banner span { flex: 1; }

    /* Bottom bar */
    .bottom-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 16px; padding-top: 12px;
      border-top: 1px solid var(--gray-lighter);
    }
    .dir-meta { font-size: 11px; color: var(--gray-mid); }

    .edit-toggle-btn {
      font-size: 11px; padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--gray-light);
      background: var(--white); color: var(--gray-mid);
      cursor: pointer; font-weight: 500; font-family: inherit; transition: all 0.15s;
    }
    .edit-toggle-btn:hover { border-color: var(--super-blue); color: var(--super-blue); }
    .edit-toggle-btn.active { background: var(--super-blue); color: var(--white); border-color: var(--super-blue); }
  </style>
</head>
<body>

  <div class="edit-banner" id="editBanner">
    <span>Edit mode — expand any dashboard, make your changes, then click Save changes.</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="folder-list" id="folderList">
    <div class="loading"><div class="spinner"></div>Loading dashboards...</div>
  </div>

  <div class="bottom-bar">
    <span class="dir-meta" id="totalMeta"></span>
    <button class="edit-toggle-btn" id="editBtn" onclick="handleEditToggle()">Edit</button>
  </div>

<script>
  const AT_TOKEN    = 'pat2N8cuaL6YFeGhH.15c835d9c15fcb10a886096d8885d4f048413cc934fbb65ac03ba107eb9e6e98';
  const BASE_ID     = 'appDk6A9yA2iqNEoG';
  const TABLE_ID    = 'tblYNRNrsZJDllc0a';
  const API_BASE    = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`;
  const DEFAULT_URL = 'https://tableau.a.intuit.com/#/site/TalentAcquisition/projects/1772';

  const HEADERS = {
    'Authorization': `Bearer ${AT_TOKEN}`,
    'Content-Type': 'application/json'
  };

  const FOLDER_ORDER = ['Executive', 'Fallout', 'Planning and Funnel', 'Recruiting'];
  const FOLDER_IDS   = { 'Executive': 'f-exec', 'Fallout': 'f-fall', 'Planning and Funnel': 'f-plan', 'Recruiting': 'f-rec' };

  let editMode = false;
  let records  = [];

  // ── API ───────────────────────────────────────────────────────
  async function fetchRecords() {
    const res = await fetch(`${API_BASE}?fields[]=Name&fields[]=Description&fields[]=Folder&fields[]=URL`, {
      headers: HEADERS
    });
    if (!res.ok) throw new Error(`${res.status}`);
    return (await res.json()).records;
  }

  async function saveRecord(id, fields) {
    const res = await fetch(`${API_BASE}/${id}`, {
      method: 'PATCH', headers: HEADERS,
      body: JSON.stringify({ fields })
    });
    if (!res.ok) throw new Error(`${res.status}`);
  }

  async function createRecord(name, folder) {
    const res = await fetch(API_BASE, {
      method: 'POST', headers: HEADERS,
      body: JSON.stringify({ records: [{ fields: { Name: name, Folder: folder, URL: DEFAULT_URL, Description: '' } }] })
    });
    if (!res.ok) throw new Error(`${res.status}`);
    return (await res.json()).records[0];
  }

  async function deleteRecord(id) {
    const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE', headers: HEADERS });
    if (!res.ok) throw new Error(`${res.status}`);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function updateMeta() {
    document.getElementById('totalMeta').textContent =
      `${records.length} dashboards across ${FOLDER_ORDER.length} folders`;
  }

  // ── Edit mode ─────────────────────────────────────────────────
  function handleEditToggle() { editMode ? disableEditMode() : enableEditMode(); }

  function enableEditMode() {
    editMode = true;
    document.getElementById('editBtn').textContent = 'Done';
    document.getElementById('editBtn').classList.add('active');
    document.getElementById('editBanner').classList.add('show');
    document.querySelectorAll('.open-btn').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.expand-indicator').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.delete-btn').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.add-dash-row').forEach(el => el.classList.add('show'));
    // Close all desc panels when entering edit mode
    document.querySelectorAll('.desc-panel').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.edit-fields').forEach(el => el.classList.remove('show'));
  }

  function disableEditMode() {
    editMode = false;
    document.getElementById('editBtn').textContent = 'Edit';
    document.getElementById('editBtn').classList.remove('active');
    document.getElementById('editBanner').classList.remove('show');
    document.querySelectorAll('.open-btn').forEach(el => el.style.display = 'inline-block');
    document.querySelectorAll('.expand-indicator').forEach(el => el.style.display = 'inline-block');
    document.querySelectorAll('.delete-btn').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.add-dash-row').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('.desc-panel').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.edit-fields').forEach(el => el.classList.remove('show'));
  }

  // ── Render ────────────────────────────────────────────────────
  function render() {
    const container = document.getElementById('folderList');
    container.innerHTML = '';

    const grouped = {};
    FOLDER_ORDER.forEach(f => grouped[f] = []);
    records.forEach(r => {
      const folder = r.fields.Folder || 'Recruiting';
      if (grouped[folder]) grouped[folder].push(r);
    });

    FOLDER_ORDER.forEach(folderName => {
      const folderId  = FOLDER_IDS[folderName];
      const dashboards = grouped[folderName];

      const folderEl = document.createElement('div');
      folderEl.className = `folder ${folderId}`;

      const header = document.createElement('div');
      header.className = 'folder-header';
      header.innerHTML = `
        <span class="folder-icon"></span>
        <span class="folder-name">${folderName}</span>
        <span class="folder-count">${dashboards.length}</span>
        <span class="chevron open">&#9654;</span>
      `;
      header.addEventListener('click', () => {
        body.classList.toggle('open');
        header.querySelector('.chevron').classList.toggle('open');
      });

      const body = document.createElement('div');
      body.className = 'folder-body open';

      dashboards.forEach(record => {
        const { id, fields } = record;

        const item = document.createElement('div');
        item.className = 'dash-item';

        // ── Main row ──────────────────────────────────
        const row = document.createElement('div');
        row.className = 'dash-row';

        const dot = document.createElement('span');
        dot.className = 'dash-dot';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'dash-name';
        nameSpan.textContent = fields.Name || '';

        const openBtn = document.createElement('a');
        openBtn.className = 'open-btn';
        openBtn.textContent = 'Open';
        openBtn.href = fields.URL || DEFAULT_URL;
        openBtn.target = '_blank';
        openBtn.rel = 'noopener noreferrer';
        if (editMode) openBtn.style.display = 'none';

        const expandInd = document.createElement('span');
        expandInd.className = 'expand-indicator';
        expandInd.innerHTML = '&#9654;';
        if (editMode) expandInd.style.display = 'none';

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '×';
        delBtn.style.display = editMode ? 'block' : 'none';
        delBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm(`Remove "${fields.Name}"?`)) return;
          try {
            await deleteRecord(id);
            records = records.filter(r => r.id !== id);
            updateMeta(); render();
          } catch(e) { showError('Failed to delete. Please try again.'); }
        });

        row.appendChild(dot);
        row.appendChild(nameSpan);
        row.appendChild(openBtn);
        row.appendChild(expandInd);
        row.appendChild(delBtn);

        // ── Description / edit panel ──────────────────
        const descPanel = document.createElement('div');
        descPanel.className = 'desc-panel';

        // View mode: description text
        const descText = document.createElement('div');
        descText.className = 'desc-text' + (fields.Description ? '' : ' empty');
        descText.textContent = fields.Description || 'No description yet. Click Edit to add one.';

        // Edit mode: fields + save button
        const editFields = document.createElement('div');
        editFields.className = 'edit-fields' + (editMode ? ' show' : '');

        const nameLabel = document.createElement('label');
        nameLabel.className = 'field-label';
        nameLabel.textContent = 'Dashboard name';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'edit-name-input';
        nameInput.value = fields.Name || '';

        const descLabel = document.createElement('label');
        descLabel.className = 'field-label';
        descLabel.textContent = 'Description';

        const descTextarea = document.createElement('textarea');
        descTextarea.className = 'edit-desc-textarea';
        descTextarea.placeholder = 'Add a description for this dashboard...';
        descTextarea.value = fields.Description || '';

        const urlLabel = document.createElement('label');
        urlLabel.className = 'field-label';
        urlLabel.textContent = 'Tableau URL';

        const urlInput = document.createElement('input');
        urlInput.type = 'text';
        urlInput.className = 'edit-url-input';
        urlInput.value = fields.URL || DEFAULT_URL;
        urlInput.placeholder = 'https://...';

        const saveRow = document.createElement('div');
        saveRow.className = 'save-row';

        const saveBtn = document.createElement('button');
        saveBtn.className = 'save-btn';
        saveBtn.textContent = 'Save changes';

        const saveFeedback = document.createElement('span');
        saveFeedback.className = 'save-feedback';

        saveBtn.addEventListener('click', async () => {
          saveBtn.disabled = true;
          saveBtn.textContent = 'Saving...';
          saveFeedback.textContent = '';
          saveFeedback.className = 'save-feedback';
          try {
            const updatedFields = {
              Name: nameInput.value,
              Description: descTextarea.value,
              URL: urlInput.value
            };
            await saveRecord(id, updatedFields);
            // Update local record
            record.fields.Name        = nameInput.value;
            record.fields.Description = descTextarea.value;
            record.fields.URL         = urlInput.value;
            // Update view
            nameSpan.textContent  = nameInput.value;
            openBtn.href          = urlInput.value;
            descText.textContent  = descTextarea.value || 'No description yet. Click Edit to add one.';
            descText.className    = 'desc-text' + (descTextarea.value ? '' : ' empty');
            saveFeedback.textContent = 'Saved ✓';
            saveFeedback.classList.add('success');
            setTimeout(() => { saveFeedback.textContent = ''; saveFeedback.className = 'save-feedback'; }, 3000);
          } catch(e) {
            saveFeedback.textContent = 'Save failed. Please try again.';
            saveFeedback.classList.add('error');
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save changes';
          }
        });

        saveRow.appendChild(saveBtn);
        saveRow.appendChild(saveFeedback);

        editFields.appendChild(nameLabel);
        editFields.appendChild(nameInput);
        editFields.appendChild(descLabel);
        editFields.appendChild(descTextarea);
        editFields.appendChild(urlLabel);
        editFields.appendChild(urlInput);
        editFields.appendChild(saveRow);

        descPanel.appendChild(descText);
        descPanel.appendChild(editFields);

        // Row click — view mode expands desc, edit mode expands edit fields
        row.addEventListener('click', (e) => {
          if (e.target === openBtn || openBtn.contains(e.target)) return;
          if (e.target === delBtn) return;
          const isOpen = descPanel.classList.contains('open');
          // Close all others first
          document.querySelectorAll('.desc-panel.open').forEach(p => {
            p.classList.remove('open');
            p.querySelector('.edit-fields')?.classList.remove('show');
          });
          document.querySelectorAll('.expand-indicator.open').forEach(i => i.classList.remove('open'));
          if (!isOpen) {
            descPanel.classList.add('open');
            if (editMode) editFields.classList.add('show');
            expandInd.classList.add('open');
          }
        });

        item.appendChild(row);
        item.appendChild(descPanel);
        body.appendChild(item);
      });

      // Add row
      const addRow = document.createElement('div');
      addRow.className = `add-dash-row ${editMode ? 'show' : ''}`;
      const addInput = document.createElement('input');
      addInput.type = 'text';
      addInput.className = 'add-dash-input';
      addInput.placeholder = 'New dashboard name...';
      const addBtn = document.createElement('button');
      addBtn.className = 'add-dash-btn';
      addBtn.textContent = '+ Add';
      addBtn.addEventListener('click', async () => {
        const name = addInput.value.trim();
        if (!name) return;
        addBtn.disabled = true; addBtn.textContent = 'Adding...';
        try {
          const newRec = await createRecord(name, folderName);
          records.push(newRec);
          addInput.value = '';
          updateMeta(); render();
        } catch(e) {
          showError('Failed to add dashboard. Please try again.');
          addBtn.disabled = false; addBtn.textContent = '+ Add';
        }
      });
      addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
      addRow.appendChild(addInput);
      addRow.appendChild(addBtn);
      body.appendChild(addRow);

      folderEl.appendChild(header);
      folderEl.appendChild(body);
      container.appendChild(folderEl);
    });

    updateMeta();
  }

  async function init() {
    try {
      records = await fetchRecords();
      render();
    } catch(e) {
      document.getElementById('folderList').innerHTML = '';
      showError('Could not load dashboards. Check your connection and try refreshing.');
    }
  }

  init();
</script>
</body>
</html>
