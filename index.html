<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau Dashboard Directory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --super-blue: #1D6BFF;
      --super-blue-dark: #1455CC;
      --super-blue-light: #E8F0FF;
      --blueberry-110: #002049;
      --agave-30: #82F2FE;
      --agave-20: #C3F5FE;
      --agave-10: #EAFEFF;
      --wintermint-100: #EFF4F8;
      --tofu-100: #F4F5F0;
      --white: #FFFFFF;
      --gray-mid: #6B7280;
      --gray-light: #E2E5EA;
      --gray-lighter: #F4F5F7;
    }

    body {
      font-family: 'Avenir Next', 'Segoe UI', Arial, sans-serif;
      background: var(--white);
      color: #1A1D23;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .folder-list { flex: 1; }

    /* Folder */
    .folder {
      border: 1px solid var(--gray-light);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: visible;
      background: var(--white);
      transition: box-shadow 0.15s;
    }
    .folder:hover { box-shadow: 0 2px 12px rgba(29,107,255,0.10); }

    .folder-header {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      cursor: pointer; background: var(--white);
      user-select: none; border-radius: 10px;
      transition: background 0.12s;
    }
    .folder-header:hover { background: var(--super-blue-light); }

    .folder-icon {
      width: 18px; height: 14px;
      border-radius: 0 4px 4px 4px;
      flex-shrink: 0; position: relative;
    }
    .folder-icon::before {
      content: ''; position: absolute;
      top: -5px; left: 0; width: 7px; height: 5px;
      border-radius: 2px 2px 0 0;
    }

    .f-exec .folder-icon         { background: #002049; }
    .f-exec .folder-icon::before { background: #002049; }
    .f-fall .folder-icon         { background: #82F2FE; }
    .f-fall .folder-icon::before { background: #82F2FE; }
    .f-plan .folder-icon         { background: #C3F5FE; }
    .f-plan .folder-icon::before { background: #C3F5FE; }
    .f-rec  .folder-icon         { background: #EFF4F8; border: 1px solid #D0DCE8; }
    .f-rec  .folder-icon::before { background: #EFF4F8; }

    /* Open button colors per folder */
    .f-exec .open-btn { background: #002049; color: #ffffff; border-color: #002049; }
    .f-exec .open-btn:hover { background: #00163a; border-color: #00163a; }

    .f-fall .open-btn { background: #82F2FE; color: #005B6B; border-color: #82F2FE; }
    .f-fall .open-btn:hover { background: #55E8F9; border-color: #55E8F9; }

    .f-plan .open-btn { background: #C3F5FE; color: #005B6B; border-color: #C3F5FE; }
    .f-plan .open-btn:hover { background: #A0EDFB; border-color: #A0EDFB; }

    .f-rec  .open-btn { background: #EFF4F8; color: #002049; border-color: #D0DCE8; }
    .f-rec  .open-btn:hover { background: #DDE7F0; border-color: #C0CEDB; }

    .folder-name { font-size: 13.5px; font-weight: 600; color: var(--blueberry-110); flex: 1; }

    .folder-count {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      background: var(--super-blue-light);
      color: var(--super-blue);
    }

    .chevron {
      font-size: 9px; color: var(--gray-mid);
      transition: transform 0.2s ease;
      display: inline-block; margin-left: 4px;
    }
    .chevron.open { transform: rotate(90deg); }

    .folder-body {
      border-top: 1px solid var(--gray-lighter);
      display: none; border-radius: 0 0 10px 10px; overflow: hidden;
    }
    .folder-body.open { display: block; }

    /* Dashboard rows */
    .dash-item {
      border-bottom: 1px solid var(--gray-lighter);
      position: relative;
    }
    .dash-item:last-child { border-bottom: none; }

    .dash-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px 8px 40px;
      transition: background 0.1s;
      cursor: pointer;
    }
    .dash-row:hover { background: var(--super-blue-light); }

    .dash-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .f-exec .dash-dot { background: #002049; }
    .f-fall .dash-dot { background: #82F2FE; border: 1px solid #50D8EE; }
    .f-plan .dash-dot { background: #C3F5FE; border: 1px solid #82D8EE; }
    .f-rec  .dash-dot { background: #EFF4F8; border: 1px solid #C0CEDB; }

    .dash-name { font-size: 13px; color: #1A1D23; flex: 1; }
    .dash-name-input {
      font-size: 13px; color: #1A1D23; flex: 1;
      border: 1.5px solid var(--gray-light); border-radius: 6px;
      padding: 3px 7px; outline: none; font-family: inherit;
      background: var(--white); display: none;
    }
    .dash-name-input:focus { border-color: var(--super-blue); }

    /* Open button */
    .open-btn {
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px; border: 1px solid;
      cursor: pointer; font-weight: 600;
      font-family: inherit; white-space: nowrap;
      transition: all 0.12s; text-decoration: none;
      display: inline-block;
    }

    /* Expand indicator */
    .expand-indicator {
      font-size: 10px; color: var(--gray-mid);
      margin-left: 2px; transition: transform 0.2s;
      display: inline-block;
    }
    .expand-indicator.open { transform: rotate(90deg); }

    .delete-btn {
      background: none; border: none; color: var(--gray-light);
      cursor: pointer; font-size: 15px; line-height: 1;
      padding: 0 2px; display: none; transition: color 0.12s;
    }
    .delete-btn:hover { color: #D93025; }

    /* Description panel */
    .desc-panel {
      display: none;
      padding: 8px 14px 10px 52px;
      background: var(--gray-lighter);
      border-top: 1px solid var(--gray-light);
    }
    .desc-panel.open { display: block; }

    .desc-text {
      font-size: 12px; color: var(--gray-mid);
      line-height: 1.5;
      font-style: italic;
    }
    .desc-text.empty { color: #BFC3CA; }

    .desc-textarea {
      font-size: 12px; color: #1A1D23;
      width: 100%; min-height: 52px;
      border: 1.5px solid var(--gray-light); border-radius: 6px;
      padding: 6px 8px; outline: none; font-family: inherit;
      background: var(--white); resize: vertical;
      display: none; line-height: 1.5;
    }
    .desc-textarea:focus { border-color: var(--super-blue); }

    .url-row {
      display: none;
      align-items: center; gap: 6px;
      margin-top: 6px;
    }
    .url-row.show { display: flex; }
    .url-label { font-size: 11px; color: var(--gray-mid); white-space: nowrap; }
    .url-input {
      font-size: 11px; color: #1A1D23; flex: 1;
      border: 1.5px solid var(--gray-light); border-radius: 6px;
      padding: 3px 7px; outline: none; font-family: inherit;
      background: var(--white);
    }
    .url-input:focus { border-color: var(--super-blue); }

    /* Add row */
    .add-dash-row {
      display: none; align-items: center; gap: 8px;
      padding: 8px 14px 8px 40px;
      border-top: 1px dashed var(--gray-light);
      background: var(--wintermint-100);
    }
    .add-dash-row.show { display: flex; }
    .add-dash-input {
      font-size: 13px; color: #1A1D23; flex: 1;
      border: 1.5px solid var(--gray-light); border-radius: 6px;
      padding: 4px 8px; outline: none; font-family: inherit; background: var(--white);
    }
    .add-dash-input:focus { border-color: var(--super-blue); }
    .add-dash-btn {
      font-size: 12px; padding: 4px 14px; border-radius: 20px;
      border: none; background: var(--super-blue); color: var(--white);
      cursor: pointer; font-weight: 600; white-space: nowrap; font-family: inherit;
    }
    .add-dash-btn:hover { background: var(--super-blue-dark); }

    /* Edit banner */
    .edit-banner {
      display: none;
      background: var(--blueberry-110);
      color: var(--white); font-size: 12px;
      padding: 8px 14px; border-radius: 8px;
      margin-bottom: 14px;
      align-items: center; gap: 8px;
    }
    .edit-banner.show { display: flex; }
    .edit-banner span { flex: 1; }
    .save-indicator { font-size: 11px; color: rgba(255,255,255,0.45); transition: color 0.3s; }
    .save-indicator.saved { color: var(--agave-30); }

    /* Bottom bar */
    .bottom-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 16px; padding-top: 12px;
      border-top: 1px solid var(--gray-lighter);
    }
    .dir-meta { font-size: 11px; color: var(--gray-mid); }

    .edit-toggle-btn {
      font-size: 11px; padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--gray-light);
      background: var(--white); color: var(--gray-mid);
      cursor: pointer; font-weight: 500; font-family: inherit; transition: all 0.15s;
    }
    .edit-toggle-btn:hover { border-color: var(--super-blue); color: var(--super-blue); }
    .edit-toggle-btn.active { background: var(--super-blue); color: var(--white); border-color: var(--super-blue); }

    .export-btn {
      font-size: 11px; padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--gray-light);
      background: var(--white); color: var(--gray-mid);
      cursor: pointer; font-weight: 500; font-family: inherit; transition: all 0.15s;
      display: none;
    }
    .export-btn.show { display: inline-block; }
    .export-btn:hover { border-color: var(--blueberry-110); color: var(--blueberry-110); }
  </style>
</head>
<body>

  <!-- Edit banner -->
  <div class="edit-banner" id="editBanner">
    <span>Edit mode — rename, add/remove dashboards, edit descriptions and URLs.</span>
    <span class="save-indicator" id="saveIndicator">Changes saved</span>
  </div>

  <div class="folder-list" id="folderList"></div>

  <div class="bottom-bar">
    <span class="dir-meta" id="totalMeta"></span>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="export-btn" id="exportBtn" onclick="exportFile()">Download updated file</button>
      <button class="edit-toggle-btn" id="editBtn" onclick="handleEditToggle()">Edit</button>
    </div>
  </div>

<script>
  const DEFAULT_URL = 'https://tableau.a.intuit.com/#/site/TalentAcquisition/projects/1772';

  const DEFAULT_DATA = {
    folders: [
      { id: 'f-exec', label: 'Executive', dashboards: [
        { name: 'Executive Summary',      status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Operating Report',       status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Year over Year Report',  status: 'live', url: DEFAULT_URL, desc: '' }
      ]},
      { id: 'f-fall', label: 'Fallout', dashboards: [
        { name: 'Candidate Fallout',   status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Disposition Report',  status: 'live', url: DEFAULT_URL, desc: '' }
      ]},
      { id: 'f-plan', label: 'Planning and Funnel', dashboards: [
        { name: 'Funnel Counts',           status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Location Health',         status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Retail Site Matching',    status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'VOA RTS by Wave Date',    status: 'live', url: DEFAULT_URL, desc: '' }
      ]},
      { id: 'f-rec', label: 'Recruiting', dashboards: [
        { name: 'Active VOAs and Hires Report', status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Hireview Pending Report',      status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Hiring Decision Report',       status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Internal Transfers Report',    status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Local Start Date Report',      status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'NYC Candidates',               status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Progress to Hiring',           status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'QBL Credential Report',        status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Referral Dashboard',           status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Rostering Report',             status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'Sourcing Team Dash',           status: 'live', url: DEFAULT_URL, desc: '' },
        { name: 'TTL Canada Work Group',        status: 'live', url: DEFAULT_URL, desc: '' }
      ]}
    ]
  };

  const STATUS_LABELS  = { live: 'Live', draft: 'Draft', review: 'In review', archived: 'Archived' };
  const STATUS_CLASSES = { live: 'tag-live', draft: 'tag-draft', review: 'tag-review', archived: 'tag-archived' };
  const STORAGE_KEY    = 'tableau_dir_data_v4';

  let editMode = false;
  let data     = loadData();

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return JSON.parse(JSON.stringify(DEFAULT_DATA));
      const saved = JSON.parse(raw);
      // Ensure url/desc fields exist on old saves
      saved.folders.forEach(f => f.dashboards.forEach(d => {
        if (!d.url)  d.url  = DEFAULT_URL;
        if (!d.desc) d.desc = '';
      }));
      return saved;
    } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    flashSaved(); updateMeta();
  }

  function flashSaved() {
    const el = document.getElementById('saveIndicator');
    el.textContent = 'Saved ✓'; el.classList.add('saved');
    setTimeout(() => { el.textContent = 'Changes saved'; el.classList.remove('saved'); }, 2000);
  }

  function updateMeta() {
    const total = data.folders.reduce((sum, f) => sum + f.dashboards.length, 0);
    document.getElementById('totalMeta').textContent = `${total} dashboards across ${data.folders.length} folders`;
  }

  function exportFile() {
    const currentData = JSON.stringify(data);
    let src = document.documentElement.outerHTML;
    src = src.replace(
      /const DEFAULT_URL[\s\S]*?let data\s*=\s*loadData\(\);/,
      `const DEFAULT_URL = 'https://tableau.a.intuit.com/#/site/TalentAcquisition/projects/1772';

  const DEFAULT_DATA = ${currentData};

  const STATUS_LABELS  = { live: 'Live', draft: 'Draft', review: 'In review', archived: 'Archived' };
  const STATUS_CLASSES = { live: 'tag-live', draft: 'tag-draft', review: 'tag-review', archived: 'tag-archived' };
  const STORAGE_KEY    = 'tableau_dir_data_v4';

  let editMode = false;
  let data     = loadData();`
    );
    const blob = new Blob([src], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html'; a.click();
    URL.revokeObjectURL(a.href);
  }

  function handleEditToggle() {
    editMode ? disableEditMode() : enableEditMode();
  }

  function enableEditMode() {
    editMode = true;
    document.getElementById('editBtn').textContent = 'Done';
    document.getElementById('editBtn').classList.add('active');
    document.getElementById('editBanner').classList.add('show');
    document.getElementById('exportBtn').classList.add('show');
    document.querySelectorAll('.dash-name').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.dash-name-input').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.open-btn').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.expand-indicator').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.delete-btn').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.add-dash-row').forEach(el => el.classList.add('show'));
    document.querySelectorAll('.desc-panel').forEach(el => el.classList.add('open'));
    document.querySelectorAll('.desc-text').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.desc-textarea').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.url-row').forEach(el => el.classList.add('show'));
  }

  function disableEditMode() {
    editMode = false;
    document.getElementById('editBtn').textContent = 'Edit';
    document.getElementById('editBtn').classList.remove('active');
    document.getElementById('editBanner').classList.remove('show');
    document.getElementById('exportBtn').classList.remove('show');
    document.querySelectorAll('.dash-name').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.dash-name-input').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.open-btn').forEach(el => el.style.display = 'inline-block');
    document.querySelectorAll('.expand-indicator').forEach(el => el.style.display = 'inline-block');
    document.querySelectorAll('.delete-btn').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.add-dash-row').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('.desc-panel').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.desc-text').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.desc-textarea').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.url-row').forEach(el => el.classList.remove('show'));
  }

  function render() {
    const container = document.getElementById('folderList');
    container.innerHTML = '';

    data.folders.forEach((folder, fi) => {
      const folderEl = document.createElement('div');
      folderEl.className = `folder ${folder.id}`;

      const header = document.createElement('div');
      header.className = 'folder-header';
      header.innerHTML = `
        <span class="folder-icon"></span>
        <span class="folder-name">${folder.label}</span>
        <span class="folder-count">${folder.dashboards.length}</span>
        <span class="chevron open">&#9654;</span>
      `;
      header.addEventListener('click', () => {
        body.classList.toggle('open');
        header.querySelector('.chevron').classList.toggle('open');
      });

      const body = document.createElement('div');
      body.className = 'folder-body open';

      folder.dashboards.forEach((dash, di) => {
        const item = document.createElement('div');
        item.className = 'dash-item';

        // ── Main row ──────────────────────────────────
        const row = document.createElement('div');
        row.className = 'dash-row';

        const dot = document.createElement('span');
        dot.className = 'dash-dot';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'dash-name';
        nameSpan.textContent = dash.name;
        if (editMode) nameSpan.style.display = 'none';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'dash-name-input';
        nameInput.value = dash.name;
        nameInput.style.display = editMode ? 'block' : 'none';
        nameInput.addEventListener('input', () => {
          data.folders[fi].dashboards[di].name = nameInput.value;
          nameSpan.textContent = nameInput.value;
          saveData();
        });



        // Open button
        const openBtn = document.createElement('a');
        openBtn.className = 'open-btn';
        openBtn.textContent = 'Open';
        openBtn.href = dash.url || DEFAULT_URL;
        openBtn.target = '_blank';
        openBtn.rel = 'noopener noreferrer';
        if (editMode) openBtn.style.display = 'none';

        // Expand indicator
        const expandInd = document.createElement('span');
        expandInd.className = 'expand-indicator';
        expandInd.innerHTML = '&#9654;';
        if (editMode) expandInd.style.display = 'none';

        // Delete button
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '×';
        delBtn.style.display = editMode ? 'block' : 'none';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          data.folders[fi].dashboards.splice(di, 1);
          saveData(); render();
        });

        row.appendChild(dot);
        row.appendChild(nameSpan);
        row.appendChild(nameInput);
        row.appendChild(openBtn);
        row.appendChild(expandInd);
        row.appendChild(delBtn);

        // ── Description panel ─────────────────────────
        const descPanel = document.createElement('div');
        descPanel.className = `desc-panel ${editMode ? 'open' : ''}`;

        const descText = document.createElement('div');
        descText.className = 'desc-text' + (dash.desc ? '' : ' empty');
        descText.textContent = dash.desc || 'No description yet. Click Edit to add one.';
        descText.style.display = editMode ? 'none' : 'block';

        const descTextarea = document.createElement('textarea');
        descTextarea.className = 'desc-textarea';
        descTextarea.placeholder = 'Add a description for this dashboard...';
        descTextarea.value = dash.desc || '';
        descTextarea.style.display = editMode ? 'block' : 'none';
        descTextarea.addEventListener('input', () => {
          data.folders[fi].dashboards[di].desc = descTextarea.value;
          descText.textContent = descTextarea.value || 'No description yet. Click Edit to add one.';
          descText.className = 'desc-text' + (descTextarea.value ? '' : ' empty');
          saveData();
        });

        const urlRow = document.createElement('div');
        urlRow.className = `url-row ${editMode ? 'show' : ''}`;
        const urlLabel = document.createElement('span');
        urlLabel.className = 'url-label';
        urlLabel.textContent = 'URL:';
        const urlInput = document.createElement('input');
        urlInput.type = 'text';
        urlInput.className = 'url-input';
        urlInput.value = dash.url || DEFAULT_URL;
        urlInput.placeholder = 'https://...';
        urlInput.addEventListener('input', () => {
          data.folders[fi].dashboards[di].url = urlInput.value;
          openBtn.href = urlInput.value;
          saveData();
        });
        urlRow.appendChild(urlLabel);
        urlRow.appendChild(urlInput);

        descPanel.appendChild(descText);
        descPanel.appendChild(descTextarea);
        descPanel.appendChild(urlRow);

        // Toggle description on row click (not in edit mode)
        row.addEventListener('click', (e) => {
          if (editMode) return;
          if (e.target === openBtn || openBtn.contains(e.target)) return;
          descPanel.classList.toggle('open');
          expandInd.classList.toggle('open');
        });

        item.appendChild(row);
        item.appendChild(descPanel);
        body.appendChild(item);
      });

      // Add row
      const addRow = document.createElement('div');
      addRow.className = `add-dash-row ${editMode ? 'show' : ''}`;
      const addInput = document.createElement('input');
      addInput.type = 'text';
      addInput.className = 'add-dash-input';
      addInput.placeholder = 'New dashboard name...';
      const addBtn = document.createElement('button');
      addBtn.className = 'add-dash-btn';
      addBtn.textContent = '+ Add';
      addBtn.addEventListener('click', () => {
        const name = addInput.value.trim();
        if (!name) return;
        data.folders[fi].dashboards.push({ name, status: 'live', url: DEFAULT_URL, desc: '' });
        addInput.value = '';
        saveData(); render();
      });
      addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
      addRow.appendChild(addInput);
      addRow.appendChild(addBtn);
      body.appendChild(addRow);

      folderEl.appendChild(header);
      folderEl.appendChild(body);
      container.appendChild(folderEl);
    });

    updateMeta();
  }

  render();
</script>
</body>
</html>
